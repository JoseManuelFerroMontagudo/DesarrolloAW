<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Examen Online interactivo con preguntas dinámicas, puntaje automático y resultado final." />
  <title>Examen Online</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="app">
    <h1>Examen Online</h1>

    <!-- ── Pantalla 1: Ingreso de datos del estudiante ──────────────────── -->
    <div id="login">
      <input id="nombre" type="text" placeholder="Nombre" autocomplete="off" />
      <input id="curso"  type="text" placeholder="Curso"  autocomplete="off" />
      <button id="btnIniciar">Iniciar examen</button>
    </div>

    <!-- ── Pantalla 2: Pregunta actual ──────────────────────────────────── -->
    <div id="examen" class="hidden">
      <h2 id="pregunta"></h2>
      <div id="opciones"></div>
      <button id="btnSiguiente" disabled>Siguiente</button>
    </div>

    <!-- ── Pantalla 3: Resultado final ──────────────────────────────────── -->
    <div id="resultado" class="hidden"></div>
  </div>

  <!-- Módulo ES6: permite usar import/export sin bundler -->
  <script type="module" src="js/app.js"></script>

</body>
</html>

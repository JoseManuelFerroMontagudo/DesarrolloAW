<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Empleados</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Gestión de Empleados</h1>

        <input type="text" id="nombre" placeholder="Nombre">
        <input type="number" id="salario" placeholder="Salario Base">

        <select id="tipo">
            <option value="fijo">Empleado Fijo</option>
            <option value="proyecto">Empleado Por Proyecto</option>
        </select>

        <input type="number" id="extra" placeholder="Pago extra (solo proyecto)">

        <button id="add">Agregar</button>

        <h2>Lista de empleados</h2>
        <ul id="lista"></ul>
        <h3 id="total">Total Nómina: $0</h3>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>

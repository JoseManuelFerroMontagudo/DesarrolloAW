<!DOCTYPE html>
<html>
<head>
  <title>Prueba Fetch Dinámica</title>
</head>
<body>
  <h1>Ingresa tus datos</h1>
  
  <label>Nombre:</label>
  <input type="text" id="cajaNombre" placeholder="Escribe tu nombre">
  <br><br>
  
  <label>Edad:</label>
  <input type="number" id="cajaEdad" placeholder="Escribe tu edad">
  <br><br>

  <button onclick="enviarDatos()">Enviar al Servidor</button>
  
  <script>
    function enviarDatos() {
      // 1. Capturamos lo que el usuario escribió en los inputs
      const valorNombre = document.getElementById('cajaNombre').value;
      const valorEdad = document.getElementById('cajaEdad').value;

      // 2. Lo enviamos al backend
      fetch('http://localhost:3000/datos', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          nombre: valorNombre,
          edad: valorEdad
        })
      })
      .then(res => res.json())
      .then(data => {
        console.log("Respuesta del servidor:", data);
        alert('¡Datos enviados con éxito!');
      });
    }
  </script>
</body>
</html>
